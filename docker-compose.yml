services:
  # ---------- Nextcloud (pre-built image — do NOT modify) ----------
  nextcloud:
    image: kefaslungu/hng-nextcloud:latest
    restart: unless-stopped
    volumes:
      - nextcloud_data:/var/www/html
      - HNG-nginx-logs:/var/log/nginx:ro
    networks:
      - internal
    depends_on:
      - db

  # ---------- PostgreSQL for Nextcloud ----------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nextcloud}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nextcloud}
      POSTGRES_DB: ${POSTGRES_DB:-nextcloud}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nextcloud}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- Nginx reverse proxy ----------
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - HNG-nginx-logs:/var/log/nginx
    networks:
      - internal
    depends_on:
      - nextcloud

  # ---------- Anomaly Detection Daemon ----------
  detector:
    build:
      context: ./detector
      dockerfile: Dockerfile
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    network_mode: host
    volumes:
      - HNG-nginx-logs:/var/log/nginx:ro
      - detector_logs:/var/log/detector
    environment:
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      WHITELIST_IPS: ${WHITELIST_IPS:-}
    depends_on:
      - nginx

volumes:
  nextcloud_data:
  pgdata:
  HNG-nginx-logs:
    name: HNG-nginx-logs
  detector_logs:

networks:
  internal:
    driver: bridge
