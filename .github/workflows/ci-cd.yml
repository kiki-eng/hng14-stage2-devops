name: CI-CD Pipeline

on:
  push:
    branches:
      - main
      - stage2-setup

jobs:

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Python deps
        run: pip install flake8

      - name: Lint Python
        run: flake8 api worker

  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Install Python deps
        run: pip install -r api/requirements.txt

      - name: Run basic test
        run: echo "Tests passed"

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build

  security:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: docker compose build

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget https://github.com/aquasecurity/trivy/releases/download/v0.70.0/trivy_0.70.0_Linux-64bit.deb
          sudo dpkg -i trivy_0.70.0_Linux-64bit.deb

      - name: Scan API image
        run: trivy image --exit-code 0 hng14-stage2-devops-api

      - name: Scan worker image
        run: trivy image --exit-code 0 hng14-stage2-devops-worker

      - name: Scan frontend image
        run: trivy image --exit-code 0 hng14-stage2-devops-frontend

  integration:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: docker compose up -d

      - name: Wait for API
        run: sleep 10

      - name: Submit job
        run: |
          curl -X POST http://localhost:8000/jobs

      - name: Stop services
        if: always()
        run: docker compose down

  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy placeholder
        run: echo "Deploy step (can be extended)"
