name: CI-CD Pipeline

on:
  push:
    branches:
      - main
      - stage3-detector
  pull_request:
    branches:
      - main

jobs:

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Python deps
        run: pip install flake8

      - name: Run flake8 on detector code
        run: flake8 detector/ --max-line-length=120

      - name: Install Hadolint
        run: |
          wget -qO /usr/local/bin/hadolint https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint

      - name: Lint Dockerfiles with Hadolint
        run: hadolint detector/Dockerfile

  build:
    runs-on: ubuntu-latest
    needs: lint

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create env file
        run: cp .env.example .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build Detector image
        uses: docker/build-push-action@v5
        with:
          context: ./detector
          push: true
          tags: |
            localhost:5000/detector:${{ github.sha }}
            localhost:5000/detector:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  integration:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create env file
        run: cp .env.example .env

      - name: Build images
        run: docker compose build

      - name: Start stack
        run: docker compose up -d

      - name: Wait for services
        run: |
          echo "Waiting for services to start..."
          sleep 30
          docker compose ps

      - name: Check detector is running
        run: |
          docker compose ps detector | grep -q "running" || \
            (echo "Detector not running"; docker compose logs detector; exit 1)

      - name: Check dashboard responds
        run: |
          for i in {1..20}; do
            curl -fsS http://localhost:8080/health && exit 0
            sleep 3
          done
          echo "Dashboard health check failed"
          docker compose logs detector
          exit 1

      - name: Cleanup
        if: always()
        run: docker compose down -v
