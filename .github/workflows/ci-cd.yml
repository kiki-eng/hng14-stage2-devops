name: CI-CD Pipeline

on:
  push:
    branches:
      - main
      - stage2-setup

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          pip install flake8

      - name: Lint Python (API + Worker)
        run: |
          flake8 api worker

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend deps
        run: |
          cd frontend
          npm install

      - name: Lint frontend (basic check)
        run: |
          echo "No ESLint configured yet — skipping strict lint"

  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          pip install -r api/requirements.txt
          pip install pytest

      - name: Run basic API test
        run: |
          python - <<EOF
          import requests
          print("Basic test placeholder")
          EOF
  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker images
        run: |
          docker compose build
  security:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.50.2_Linux-64bit.deb
          sudo dpkg -i trivy_0.50.2_Linux-64bit.deb

      - name: Scan Docker images
        run: |
          docker compose build
          trivy image hng14-stage2-devops-api
