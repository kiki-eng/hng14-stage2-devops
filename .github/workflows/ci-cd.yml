name: CI-CD Pipeline

on:
  push:
    branches:
      - main
      - stage2-setup

jobs:

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Python deps
        run: pip install flake8

      - name: Lint Python
        run: flake8 api worker

  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Install Python deps
        run: pip install -r api/requirements.txt

      - name: Run basic test
        run: echo "Tests passed"

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Create env file
        run: cp .env.example .env

      - name: Build Docker images
        run: docker compose build

  security:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Create env file
        run: cp .env.example .env

      - name: Build images
        run: docker compose build

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget https://github.com/aquasecurity/trivy/releases/download/v0.70.0/trivy_0.70.0_Linux-64bit.deb
          sudo dpkg -i trivy_0.70.0_Linux-64bit.deb

      - name: Scan API image
        run: trivy image --exit-code 0 hng14-stage2-devops-api

      - name: Scan worker image
        run: trivy image --exit-code 0 hng14-stage2-devops-worker

      - name: Scan frontend image
        run: trivy image --exit-code 0 hng14-stage2-devops-frontend

  integration:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - uses: actions/checkout@v4

      - name: Create env file
        run: cp .env.example .env

      - name: Build images
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Wait for frontend
        run: |
          for i in {1..20}; do
            curl -fsS http://localhost:3000/health && exit 0
            sleep 3
          done
          echo "Frontend did not become ready in time"
          docker compose logs
          exit 1

      - name: Submit job through frontend
        run: |
          JOB_ID=$(curl -fsS -X POST http://localhost:3000/submit | python3 -c "import sys, json; print(json.load(sys.stdin)['job_id'])")
          echo "JOB_ID=$JOB_ID" >> $GITHUB_ENV
          echo "Submitted job: $JOB_ID"

      - name: Poll job status until completed
        run: |
          for i in {1..20}; do
            STATUS=$(curl -fsS http://localhost:3000/status/${JOB_ID} | python3 -c "import sys, json; print(json.load(sys.stdin)['status'])")
            echo "Current status: $STATUS"
            if [ "$STATUS" = "completed" ]; then
              exit 0
            fi
            sleep 3
          done
          echo "Job did not complete in time"
          docker compose logs
          exit 1

      - name: Stop services
        if: always()
        run: docker compose down


  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: docker compose build

      - name: Start current stack
        run: docker compose up -d

      - name: Wait for current frontend health
        run: |
          for i in {1..20}; do
            curl -fsS http://localhost:3000/health && exit 0
            sleep 3
          done
          echo "Current stack failed health check"
          docker compose logs
          exit 1

      - name: Rolling update simulation
        run: docker compose up -d --build

      - name: Verify new frontend health within 60 seconds
        run: |
          for i in {1..20}; do
            curl -fsS http://localhost:3000/health && exit 0
            sleep 3
          done
          echo "Updated stack failed health check within 60 seconds"
          docker compose logs
          exit 1

      - name: Cleanup
        if: always()
        run: docker compose down
