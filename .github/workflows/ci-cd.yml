name: CI-CD Pipeline

on:
  push:
    branches:
      - main
      - stage2-setup

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          pip install flake8

      - name: Lint Python (API + Worker)
        run: |
          flake8 api worker

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend deps
        run: |
          cd frontend
          npm install

      - name: Lint frontend (basic check)
        run: |
          echo "No ESLint configured yet — skipping strict lint"

  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          pip install -r api/requirements.txt
          pip install pytest

      - name: Run basic API test
        run: |
          python - <<EOF
          import requests
          print("Basic test placeholder")
          EOF
